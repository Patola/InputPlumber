name: Build Arch Package

on:
  push:
    branches:
      - fix/legion-go-2-mouse-wheel-encoding
      - main
    paths-ignore:
      - README.md
      - "docs/**"

jobs:
  build-arch-pkg:
    name: Build Arch Linux Package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialize pacman keyring and update system
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm \
            base-devel \
            git \
            rust \
            cargo \
            clang \
            dbus \
            libevdev \
            libiio \
            sudo

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: /home/builder/.cargo/registry
          key: arch-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            arch-cargo-registry-

      - name: Fix cargo cache ownership
        run: |
          mkdir -p /home/builder/.cargo/registry
          chown -R builder:builder /home/builder/.cargo

      - name: Build Arch package
        working-directory: pkg/archlinux
        run: |
          sudo -u builder HOME=/home/builder makepkg -s --noconfirm --noprogressbar

      - name: List built packages
        working-directory: pkg/archlinux
        run: ls -lh *.pkg.tar.zst

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: inputplumber-patola-pkg
          path: pkg/archlinux/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 30
